amcl:
  ros__parameters:
    use_sim_time: true

  
    laser_model_type: likelihood_field
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 360
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

  
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.1

 
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: scan
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    update_min_d: 0.2
    update_min_a: 0.5236   
    resample_interval: 2
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    set_initial_pose: true
    initial_pose:
        x: -4.0
        y: -3.60
        z: 0.0
        yaw: 1.5708
    tf_broadcast: true
    transform_tolerance: 1.0    
    save_pose_rate: 0.5
    first_map_only: false